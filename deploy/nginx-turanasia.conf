# /etc/nginx/sites-available/turanasia
# Фронт (статика) + Laravel API на одном домене.
# Веб-корень = public/ Laravel; статические страницы фронта лежат рядом с index.php.

server {
    listen 80;
    listen [::]:80;
    server_name turan-asia.kz www.turan-asia.kz;

    root /var/www/turanasia/public;
    index index.html index.php;

    charset utf-8;
    client_max_body_size 12M;            # запас под загрузку фото (лимит 8 МБ)

    # gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Статика фронта → если файла нет, отдаём фронт-контроллер Laravel (/api, /sitemap.xml и т.д.)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP (Laravel)
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # проверьте версию: php -v
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Кэш статических ассетов
    location ~* \.(css|js|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/turanasia.access.log;
    error_log  /var/log/nginx/turanasia.error.log;
}
